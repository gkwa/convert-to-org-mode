version: "3.7"
services:
  tidy:
    build: tidy
    volumes:
    - myorgfiles:/tmp/scratch
  pandoc_cleanup:
    build: pandoc_cleanup
    volumes:
    - myorgfiles:/tmp/scratch
  emacs_cleanup:
    build: emacs_cleanup
    volumes:
    - myorgfiles:/tmp/scratch
  pandoc:
    image: pandoc/core@sha256:9e71908b62c4df03c25d38f8e6e5d8d081787b5c1707eb3d6cc99b0b6af0c081
    volumes:
    - myorgfiles:/tmp/scratch
  flask-receive-html:
    build: receive
    ports:
    - 127.0.0.1:8989:5000
    restart: unless-stopped
    working_dir: /
    volumes:
    - myorgfiles:/tmp/scratch
    - /var/run/docker.sock:/var/run/docker.sock
volumes:
  myorgfiles:
    name: myorgfiles
